name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/*.md'
      - 'examples/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/*.md'
      - 'examples/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Format check with ruff
        run: ruff format --check src/ tests/
      - name: Type check with mypy
        run: mypy src/haulpave/

  test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'push' && fromJSON('["3.10", "3.11", "3.12"]') || fromJSON('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Show package versions
        run: pip list
      - name: Run tests with coverage
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python --version
          pytest --cov=haulpave --cov-report=term-missing --cov-fail-under=85 tests/ -v --tb=long 2>&1 | tee /tmp/pytest_out.txt
          PYTEST_EXIT=${PIPESTATUS[0]}
          echo "PYTEST_EXIT=${PYTEST_EXIT}" >> "$GITHUB_ENV"
          exit ${PYTEST_EXIT}
      - name: Post failure details to PR
        if: env.PYTEST_EXIT != '0' && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - << 'PYEOF'
          import os, json
          from urllib.request import urlopen, Request
          with open('/tmp/pytest_out.txt') as f:
              content = f.read()
          if len(content) > 10000:
              content = "...[truncated - showing last 10000 chars]\n" + content[-10000:]
          py_ver = "${{ matrix.python-version }}"
          body = f"**Test failure on Python {py_ver}**\n\n<details><summary>Click to expand test output</summary>\n\n```\n{content}\n```\n</details>"
          pr_num = os.environ.get('PR_NUMBER', '')
          token = os.environ.get('GH_TOKEN', '')
          if not pr_num or not token:
              print("Missing PR_NUMBER or GH_TOKEN")
              exit(0)
          url = f"https://api.github.com/repos/rachmad-jenss/haul-pave/issues/{pr_num}/comments"
          data = json.dumps({"body": body}).encode()
          req = Request(url, data=data, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          })
          try:
              with urlopen(req) as resp:
                  print(f"Posted comment, status: {resp.status}")
          except Exception as e:
              print(f"Failed to post comment: {e}")
          PYEOF
      - name: Fail if tests failed
        if: env.PYTEST_EXIT != '0'
        run: exit 1
      - name: Run benchmark tests
        # Exit code 5 = "no tests collected" — expected until Phase 0 benchmarks land.
        # Any other non-zero exit code (1 = test failure) is a real error.
        run: pytest tests/benchmarks/ -v --tb=long --no-cov || [ $? -eq 5 ]

  docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[docs]"
      - name: Build docs
        run: mkdocs build --strict
