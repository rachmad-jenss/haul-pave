name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/*.md'
      - 'examples/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/*.md'
      - 'examples/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Format check with ruff
        run: ruff format --check src/ tests/
      - name: Type check with mypy
        run: mypy src/haulpave/

  test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'push' && fromJSON('["3.10", "3.11", "3.12"]') || fromJSON('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Show package versions
        run: pip list | grep -E "pydantic|numpy|scipy|typer|pytest|rich|coverage"
      - name: Run tests with coverage
        id: run-tests
        run: |
          pytest --cov=haulpave --cov-report=term-missing --cov-fail-under=85 tests/ -v --tb=long 2>&1 | tee /tmp/pytest_output.txt
          exit ${PIPESTATUS[0]}
      - name: Post test failure as PR comment
        if: failure() && steps.run-tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/pytest_output.txt', 'utf8');
            const truncated = output.length > 8000 ? '...(truncated)\n' + output.slice(-7000) : output;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**CI test failure on Python \`${{ matrix.python-version }}\`**\n\n<details><summary>pytest output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>`
            });
      - name: Run benchmark tests
        # Exit code 5 = "no tests collected" — expected until Phase 0 benchmarks land.
        # Any other non-zero exit code (1 = test failure) is a real error.
        run: pytest tests/benchmarks/ -v --tb=long --no-cov || [ $? -eq 5 ]

  docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[docs]"
      - name: Build docs
        run: mkdocs build --strict
